      <rect x="300" y="104" width="154" height="42" rx="11" fill="#05060A" stroke="#22D3EE" stroke-opacity="0.42"/>
      <text x="333" y="131" fill="#F1F3F9" font-size="15" font-weight="750">graph index</text>
