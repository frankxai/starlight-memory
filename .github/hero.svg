    <text x="74" y="187" fill="#AEB7D8" font-size="20" font-weight="500">Provider contract, routing policy, and resource discipline</text>
    <text x="74" y="216" fill="#AEB7D8" font-size="20" font-weight="500">for agent memory that stays local-core first.</text>

