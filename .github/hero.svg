<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Starlight Memory</title>
  <desc id="desc">A sovereign memory router: local core first, privacy-aware policy, and optional provider adapters.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#05060A"/>
      <stop offset="0.72" stop-color="#080C16"/>
      <stop offset="1" stop-color="#0D1625"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6EA8FE"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="360" fill="url(#bg)"/>
  <g opacity="0.16" stroke="#6EA8FE" stroke-width="1">
