      <text x="154" y="23" fill="#F1F3F9" font-size="13" font-weight="750">routing</text>
      <rect x="250" width="92" height="34" rx="17" fill="#0D1625" stroke="#F5B84B" stroke-opacity="0.7"/>
      <text x="272" y="23" fill="#F1F3F9" font-size="13" font-weight="750">policy</text>
    </g>

    <g transform="translate(590 64)">
      <rect width="500" height="232" rx="20" fill="#0A0F1D" stroke="#6EA8FE" stroke-opacity="0.42"/>
      <rect x="28" y="28" width="160" height="58" rx="12" fill="#05060A" stroke="#F5B84B" stroke-opacity="0.72"/>
